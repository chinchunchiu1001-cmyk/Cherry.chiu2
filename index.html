<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>人員名冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1C2B4A;
    --navy-deep:#121E36;
    --paper:#FAF7F1;
    --paper-deep:#F2EDE2;
    --card:#FFFFFF;
    --gold:#A87C3F;
    --gold-soft:#E8DCC4;
    --ink:#22262E;
    --ink-secondary:#5C6478;
    --ink-faint:#9098A8;
    --line:#E4DFD3;
    --line-strong:#D7CFBC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .serif{font-family:'Noto Serif TC',serif;}

  /* ===== App shell ===== */
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    overflow-x:hidden;
  }

  /* ===== Header ===== */
  .header{
    background:var(--navy);
    color:#fff;
    padding:28px 20px 22px;
    position:relative;
  }
  .header::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:4px;
    background:linear-gradient(90deg, var(--gold) 0%, var(--gold) 40%, transparent 40%);
    opacity:0.85;
  }
  .header-eyebrow{
    font-size:11px;
    letter-spacing:2px;
    color:var(--gold-soft);
    text-transform:uppercase;
    margin:0 0 8px;
    font-weight:500;
  }
  .header-title{
    font-size:26px;
    font-weight:700;
    margin:0 0 4px;
    letter-spacing:1px;
  }
  .header-sub{
    font-size:13px;
    color:rgba(255,255,255,0.62);
    margin:0;
  }
  .header-stats{
    display:flex;
    gap:18px;
    margin-top:18px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.12);
  }
  .stat{flex:1;}
  .stat-num{
    font-size:20px;
    font-weight:700;
    font-family:'Noto Serif TC',serif;
    color:#fff;
    line-height:1.1;
  }
  .stat-label{
    font-size:11px;
    color:rgba(255,255,255,0.55);
    margin-top:2px;
  }

  /* ===== Search ===== */
  .search-wrap{
    padding:14px 20px 6px;
    background:var(--paper);
    position:sticky;
    top:0;
    z-index:5;
  }
  .search-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card);
    border:1px solid var(--line-strong);
    border-radius:10px;
    padding:10px 14px;
  }
  .search-box svg{flex-shrink:0; opacity:0.45;}
  .search-box input{
    border:none;
    outline:none;
    background:transparent;
    font-size:14px;
    width:100%;
    font-family:inherit;
    color:var(--ink);
  }
  .search-box input::placeholder{color:var(--ink-faint);}

  /* ===== List ===== */
  .list-wrap{padding:8px 20px 32px;}
  .dept-group{margin-top:18px;}
  .dept-label{
    display:flex;
    align-items:baseline;
    gap:8px;
    font-size:12px;
    font-weight:600;
    color:var(--gold);
    letter-spacing:0.5px;
    margin:0 2px 8px;
    text-transform:uppercase;
  }
  .dept-label .count{
    color:var(--ink-faint);
    font-weight:400;
    text-transform:none;
    letter-spacing:0;
  }
  .card-list{
    background:var(--card);
    border-radius:12px;
    border:1px solid var(--line);
    overflow:hidden;
  }
  .person-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 14px;
    cursor:pointer;
    border-bottom:1px solid var(--line);
    -webkit-tap-highlight-color:transparent;
    transition:background 0.15s ease;
  }
  .person-row:last-child{border-bottom:none;}
  .person-row:active{background:var(--paper-deep);}

  .avatar{
    width:42px;
    height:42px;
    border-radius:10px;
    background:var(--navy);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:15px;
    flex-shrink:0;
    position:relative;
  }
  .row-id{
    font-size:10px;
    color:var(--ink-faint);
    font-family:'Noto Serif TC',serif;
    letter-spacing:0.5px;
    flex-shrink:0;
    width:22px;
    text-align:right;
  }
  .row-main{flex:1; min-width:0;}
  .row-name{
    font-size:15.5px;
    font-weight:600;
    color:var(--ink);
    margin:0 0 2px;
  }
  .row-meta{
    font-size:12.5px;
    color:var(--ink-secondary);
    margin:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .row-meta .sep{color:var(--line-strong); margin:0 5px;}
  .row-chevron{
    flex-shrink:0;
    opacity:0.35;
  }

  /* ===== Detail overlay ===== */
  .detail{
    position:fixed;
    top:0; left:50%;
    transform:translateX(calc(-50% + 100%));
    width:100%;
    max-width:480px;
    height:100%;
    background:var(--paper);
    z-index:50;
    overflow-y:auto;
    transition:transform 0.32s cubic-bezier(.32,.72,0,1);
    -webkit-overflow-scrolling:touch;
  }
  .detail.open{transform:translateX(-50%);}

  .detail-header{
    background:var(--navy);
    color:#fff;
    padding:16px 20px 26px;
    position:relative;
  }
  .back-btn{
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,0.1);
    border:none;
    color:#fff;
    font-size:13.5px;
    font-family:inherit;
    padding:8px 14px 8px 10px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:18px;
  }
  .detail-id{
    font-size:11px;
    color:var(--gold-soft);
    letter-spacing:1.5px;
    font-family:'Noto Serif TC',serif;
    margin:0 0 8px;
  }
  .detail-name{
    font-size:25px;
    font-weight:700;
    margin:0 0 8px;
    letter-spacing:1px;
  }
  .detail-tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .tag{
    font-size:11.5px;
    padding:4px 10px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.85);
  }
  .tag.gold{
    background:var(--gold);
    color:#2A1E0E;
    font-weight:500;
  }

  .detail-body{padding:22px 20px 40px;}
  .section{margin-bottom:26px;}
  .section-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:600;
    color:var(--navy);
    text-transform:uppercase;
    letter-spacing:1px;
    margin:0 0 12px;
  }
  .section-title .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--gold);
    flex-shrink:0;
  }

  .bio-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px 16px 18px;
    border-left:3px solid var(--gold);
  }
  .bio-text{
    font-size:14.5px;
    line-height:1.85;
    color:var(--ink);
    margin:0;
    white-space:pre-line;
  }

  .timeline{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:6px 16px;
  }
  .tl-item{
    display:flex;
    gap:12px;
    padding:13px 0;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .tl-item:last-child{border-bottom:none;}
  .tl-marker{
    flex-shrink:0;
    width:8px;
    padding-top:5px;
    display:flex;
    justify-content:center;
  }
  .tl-marker .pip{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--navy);
    border:2px solid var(--gold-soft);
  }
  .tl-text{
    font-size:14px;
    color:var(--ink);
    line-height:1.6;
    flex:1;
  }

  .manager-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .manager-avatar{
    width:46px;height:46px;
    border-radius:50%;
    background:var(--paper-deep);
    border:1px solid var(--line-strong);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:15px;
    color:var(--navy);
    flex-shrink:0;
  }
  .manager-info .m-label{
    font-size:11.5px;
    color:var(--ink-faint);
    margin:0 0 2px;
  }
  .manager-info .m-name{
    font-size:16px;
    font-weight:600;
    color:var(--ink);
    margin:0;
    font-family:'Noto Serif TC',serif;
  }
  .manager-note{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
    font-size:13.5px;
    line-height:1.7;
    color:var(--ink-secondary);
  }

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-faint);
    font-size:14px;
  }

  @media (min-width: 481px){
    .app{box-shadow:0 0 40px rgba(0,0,0,0.06);}
  }
</style>
</head>

    <p class="header-eyebrow">人員名冊 · personnel roster</p>

</div>

function escapeHTML(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initials(name){
  return name.slice(0,1);
}

function groupByDept(list){
  const map = new Map();
  list.forEach(p=>{
    if(!map.has(p.dept)) map.set(p.dept, []);
    map.get(p.dept).push(p);
  });
  return map;
}

function renderStats(){
  const deptCount = new Set(PEOPLE.map(p=>p.dept)).size;
  document.getElementById('headerStats').innerHTML = `
    <div class="stat"><div class="stat-num serif">${PEOPLE.length}</div><div class="stat-label">位同仁</div></div>
    <div class="stat"><div class="stat-num serif">${deptCount}</div><div class="stat-label">個部門</div></div>
  `;
}

function renderList(filterText){
  const wrap = document.getElementById('listWrap');
  const q = (filterText||'').trim().toLowerCase();
  const filtered = PEOPLE.filter(p=>{
    if(!q) return true;
    return p.name.toLowerCase().includes(q) || p.dept.toLowerCase().includes(q) || p.title.toLowerCase().includes(q);
  });

  if(filtered.length === 0){
    wrap.innerHTML = `<div class="empty-state">找不到符合「${escapeHTML(filterText)}」的同仁</div>`;
    return;
  }

  const grouped = groupByDept(filtered);
  let html = '';
  let counter = 0;
  grouped.forEach((people, dept)=>{
    html += `<div class="dept-group">
      <p class="dept-label">${escapeHTML(dept)} <span class="count">· ${people.length} 人</span></p>
      <div class="card-list">`;
    people.forEach(p=>{
      const idx = PEOPLE.indexOf(p);
      counter++;
      html += `
        <div class="person-row" data-idx="${idx}">
          <span class="row-id serif">${String(idx+1).padStart(3,'0')}</span>
          <div class="avatar">${escapeHTML(initials(p.name))}</div>
          <div class="row-main">
            <p class="row-name serif">${escapeHTML(p.name)}</p>
            <p class="row-meta">${escapeHTML(p.title)}<span class="sep">·</span>${escapeHTML(p.dept)}</p>
          </div>
          <svg class="row-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5C6478" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </div>`;
    });
    html += `</div></div>`;
  });
  wrap.innerHTML = html;

  wrap.querySelectorAll('.person-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      openDetail(parseInt(row.dataset.idx, 10));
    });
  });
}

function renderDetail(p, idx){
  const timelineHTML = (p.history && p.history.length)
    ? p.history.map(h => `
        <div class="tl-item">
          <div class="tl-marker"><span class="pip"></span></div>
          <div class="tl-text">${escapeHTML(h)}</div>
        </div>`).join('')
    : `<div class="tl-item"><div class="tl-text" style="color:var(--ink-faint);">尚無經歷資料</div></div>`;

  const managerNoteHTML = p.managerNote
    ? `<div class="manager-note">${escapeHTML(p.managerNote)}</div>`
    : '';

  return `
    <div class="detail-header">
      <button class="back-btn" id="backBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回名冊
      </button>
      <p class="detail-id serif">人員編號 ${String(idx+1).padStart(3,'0')}</p>
      <h2 class="detail-name serif">${escapeHTML(p.name)}</h2>
      <div class="detail-tags">
        <span class="tag gold">${escapeHTML(p.title)}</span>
        <span class="tag">${escapeHTML(p.dept)}</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="section">
        <p class="section-title"><span class="dot"></span>個人簡介</p>
        <div class="bio-card">
          <p class="bio-text">${escapeHTML(p.bio) || '尚無簡介資料'}</p>
        </div>
      </div>

      <div class="section">
        <p class="section-title"><span class="dot"></span>經歷年資</p>
        <div class="timeline">${timelineHTML}</div>
      </div>

      <div class="section">
        <p class="section-title"><span class="dot"></span>直屬主管</p>
        <div class="manager-card">
          <div class="manager-avatar serif">${escapeHTML(initials(p.manager || '—'))}</div>
          <div class="manager-info">
            <p class="m-label">直屬主管</p>
            <p class="m-name serif">${escapeHTML(p.manager) || '未提供'}</p>
          </div>
        </div>
        ${managerNoteHTML}
      </div>
    </div>
  `;
}

function openDetail(idx){
  const p = PEOPLE[idx];
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = renderDetail(p, idx);
  panel.scrollTop = 0;
  requestAnimationFrame(()=>{
    panel.classList.add('open');
  });
  document.getElementById('backBtn').addEventListener('click', closeDetail);
}

function closeDetail(){
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  renderList(e.target.value);
});

renderStats();
renderList('');
</script>
